# Fly.io config for DroneSearch.
# Bootstrap: `fly launch --no-deploy`, edit `app` below, then:
#   fly volumes create drone_data --size 5 --region <your-region>
#   fly secrets set GEMINI_API_KEY=...
#   fly deploy

app = "drone-search"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  DRONE_SEARCH_DATA_DIR = "/app/data"
  DRONE_SEARCH_YOLO_MODEL = "yolov8n.pt"
  DRONE_SEARCH_MAX_FRAME_CAPTIONS = "60"

[[mounts]]
  source = "drone_data"
  destination = "/app/data"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
