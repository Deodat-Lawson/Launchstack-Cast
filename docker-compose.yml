services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cast
      POSTGRES_PASSWORD: cast
      POSTGRES_DB: cast
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cast"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
